id: loop-switch
namespace: io.kestra.tests

tasks:
  - id: t1
    type: io.kestra.plugin.core.debug.Return
    format: "{{task.id}}"
  - id: 2_each
    type: io.kestra.plugin.core.flow.Loop
    values: '["a", "b"]'
    tasks:
      # Switch
      - id: 2-1_switch
        type: io.kestra.plugin.core.flow.Switch
        value: "{{item.value}}"
        cases:
          a:
            - id: 2-1_switch-letter-a
              type: io.kestra.plugin.core.debug.Return
              format: "{{task.id}}"
          b:
            - id: 2-1_switch-letter-b
              type: io.kestra.plugin.core.debug.Return
              format: "{{task.id}}"

            - id: 2-1_each
              type: io.kestra.plugin.core.flow.Loop
              values: '["1", "2"]'
              tasks:
              - id: 2-1-1_switch
                type: io.kestra.plugin.core.flow.Switch
                value: "{{item.value}}"
                cases:
                  1:
                    - id: 2-1-1_switch-number-1
                      type: io.kestra.plugin.core.debug.Return
                      format: "{{item.value}}"
                  2:
                    - id: 2-1-1_switch-number-2
                      type: io.kestra.plugin.core.debug.Return
                      format: "{{item.value}} {{item.parent.value}}"
  - id: 2_end
    type: io.kestra.plugin.core.debug.Return
    format: "{{task.id}}"
