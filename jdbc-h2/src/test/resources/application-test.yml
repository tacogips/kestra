datasources:
  h2:
    url: jdbc:h2:mem:public;TIME ZONE=UTC;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    driverClassName: org.h2.Driver

kestra:
  server-type: STANDALONE
  server:
    liveness:
      enabled: false
    termination-grace-period: 5s
    service:
      purge:
        initial-delay: 1h
        fixed-delay: 1d
        retention: 30d
  queue:
    type: h2
    message-protection:
      enabled: true
      limit: 1048576

  repository:
    type: h2
  storage:
    type: local
    local:
      base-path: /tmp/unittest
  jdbc:
    queues:
      min-poll-interval: 10ms
      max-poll-interval: 100ms
      poll-switch-interval: 5s

  grpc:
    maxRetryAttempts: 1
    shutdownTimeout: 3s
  controller:
    port: ${random.port}
  worker:
    controllers:
      type: STATIC
      static:
        endpoints:
          - host: localhost
            port: ${kestra.controller.port}
# Disable Micronaut embedded gRPC server and health check
grpc:
  server:
    enabled: false
    health:
      enabled: false