datasources:
  mysql:
    url: jdbc:mysql://localhost:3306/kestra_unit
    driverClassName: com.mysql.cj.jdbc.Driver
    username: kestra
    password: k3str4
    dialect: MYSQL
    maximumPoolSize: 32
    minimumIdle: 8
    connectionTimeout: 30000
    idleTimeout: 600000
    maxLifetime: 1800000
    transactionIsolation: TRANSACTION_READ_COMMITTED

kestra:
  server-type: STANDALONE
  server:
    liveness:
      enabled: false
    termination-grace-period: 5s
    service:
      purge:
        initial-delay: 1h
        fixed-delay: 1d
        retention: 30d
  queue:
    type: mysql
    message-protection:
      enabled: true
      limit: 1048576
  repository:
    type: mysql
  storage:
    type: local
    local:
      base-path: /tmp/unittest
  jdbc:
    queues:
      min-poll-interval: 10ms
      max-poll-interval: 100ms
      poll-switch-interval: 5s
  grpc:
    maxRetryAttempts: 1
    shutdownTimeout: 3s

  controller:
    port: ${random.port}
  worker:
    controllers:
      type: STATIC
      static:
        endpoints:
          - host: localhost
            port: ${kestra.controller.port}
# Disable Micronaut GRPC
grpc:
  server:
    enabled: false
    health:
      enabled: false