endpoints:
  env:
    enabled: true

kestra:
  repository:
    type: h2
  queue:
    type: h2
  storage:
    type: local
    local:
      base-path: /tmp/unittest
  plugins:
    path: /tmp/plugins
    repositories:
      central:
        url: https://repo.maven.apache.org/maven2/
      sonatype:
        url: https://central.sonatype.com/repository/maven-snapshots/
  server:
    liveness:
      enabled: false
    termination-grace-period: 5s
  grpc:
    maxRetryAttempts: 1
    shutdownTimeout: 3s
  controller:
    port: ${random.port}
  worker:
    controllers:
      type: STATIC
      static:
        endpoints:
          - host: localhost
            port: ${kestra.controller.port}
# Disable Micronaut embedded gRPC server and health check
grpc:
  server:
    enabled: false
    health:
      enabled: false
micronaut:
  http:
    services:
      remote-api:
        read-idle-timeout: 180s
        connect-timeout: 180s
        read-timeout: 180s

datasources:
  h2:
    url: jdbc:h2:mem:db-${random.uuid};TIME ZONE=UTC;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    driverClassName: org.h2.Driver

