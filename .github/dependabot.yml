# See GitHub's docs for more information on this file:
# https://docs.github.com/en/free-pro-team@latest/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2

updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      timezone: "Europe/Paris"
      time: "08:00"
    open-pull-requests-limit: 50
    labels: ["dependency-upgrade", "area/devops"]

  # Maintain dependencies for Gradle modules
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      timezone: "Europe/Paris"
      time: "08:00"
    open-pull-requests-limit: 50
    labels: ["dependency-upgrade", "area/backend"]
    ignore:
      # Ignore versions of Protobuf >= 4.0.0 because Orc still uses version 3
      - dependency-name: "com.google.protobuf:*"
        versions: ["[4,)"]

  # Maintain dependencies for NPM modules (core UI)
  - package-ecosystem: "npm"
    directory: "/ui"
    commit-message:
      prefix: "build(deps)"
      prefix-development: "build(deps)"
    schedule:
      interval: "weekly"
      day: "wednesday"
      timezone: "Europe/Paris"
      time: "08:00"
    open-pull-requests-limit: 50
    labels: ["dependency-upgrade", "area/frontend"]
    groups:
      build:
        applies-to: version-updates
        patterns:
          ["@esbuild/*", "@rollup/*", "@rolldown/*", "@swc/*", "lightningcss-*"]

      types:
        applies-to: version-updates
        patterns: ["@types/*"]

      storybook:
        applies-to: version-updates
        patterns: ["storybook*", "@storybook/*", "eslint-plugin-storybook"]

      vitest:
        applies-to: version-updates
        patterns: ["vitest", "@vitest/*"]

      major:
        update-types: ["major"]
        applies-to: version-updates
        exclude-patterns:
          [
            "@esbuild/*",
            "@rollup/*",
            "@rolldown/*",
            "@swc/*",
            "lightningcss-*",
            "@types/*",
            "storybook*",
            "@storybook/*",
            "eslint-plugin-storybook",
            "vitest",
            "@vitest/*",
          ]

      minor:
        update-types: ["minor"]
        applies-to: version-updates
        exclude-patterns: [
            "@esbuild/*",
            "@rollup/*",
            "@rolldown/*",
            "@swc/*",
            "lightningcss-*",
            "@types/*",
            "storybook*",
            "@storybook/*",
            "eslint-plugin-storybook",
            "vitest",
            "@vitest/*",
            # Temporary exclusion of these packages from minor updates
            "monaco-editor",
          ]

      patch:
        update-types: ["patch"]
        applies-to: version-updates
        exclude-patterns:
          [
            "@esbuild/*",
            "@rollup/*",
            "@rolldown/*",
            "@swc/*",
            "lightningcss-*",
            "@types/*",
            "storybook*",
            "@storybook/*",
            "eslint-plugin-storybook",
            "vitest",
            "@vitest/*",
          ]

    ignore:
      # Ignore TypeScript major updates (v6 currently conflicts with @typescript-eslint which requires <6.0.0)
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

      # Ignore eslint major updates (eslint@10 currently conflicts with typescript-eslint + eslint-plugin-vue)
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]

      # Ignore @eslint/js major updates (v10 requires eslint ^10 but project is on eslint ^9)
      - dependency-name: "@eslint/js"
        update-types: ["version-update:semver-major"]

      # Ignore eslint-plugin-vue all updates (v10 requires eslint ^10 but project is on eslint ^9)
      - dependency-name: "eslint-plugin-vue"
        versions: ["*"]

      # Ignore updates to monaco-yaml; version is pinned to 5.3.1 due to patch-package script additions
      - dependency-name: "monaco-yaml"
        versions: [">=5.3.2"]

      # Ignore lint-staged major updates (v17 requires Node.js >=22.22.1 which is not yet released)
      - dependency-name: "lint-staged"
        update-types: ["version-update:semver-major"]

  # Maintain dependencies for ui/packages/design-system
  - package-ecosystem: "npm"
    directory: "/ui/packages/design-system"
    commit-message:
      prefix: "build(design-system)"
      prefix-development: "build(design-system)"
    schedule:
      interval: "weekly"
      day: "wednesday"
      timezone: "Europe/Paris"
      time: "08:00"
    open-pull-requests-limit: 50
    labels: ["dependency-upgrade", "area/frontend"]
    groups:
      build:
        applies-to: version-updates
        patterns: ["tsdown", "vite", "@vitejs/*", "sass-embedded"]

      types:
        applies-to: version-updates
        patterns: ["@types/*"]

      storybook:
        applies-to: version-updates
        patterns: ["storybook", "@storybook/*"]

      vitest:
        applies-to: version-updates
        patterns: ["vitest", "@vitest/*"]

      remark:
        applies-to: version-updates
        patterns: ["remark-*", "unified"]

      major:
        update-types: ["major"]
        applies-to: version-updates
        exclude-patterns:
          [
            "tsdown",
            "vite",
            "@vitejs/*",
            "sass-embedded",
            "@types/*",
            "storybook",
            "@storybook/*",
            "vitest",
            "@vitest/*",
            "remark-*",
            "unified",
          ]

      minor:
        update-types: ["minor"]
        applies-to: version-updates
        exclude-patterns:
          [
            "tsdown",
            "vite",
            "@vitejs/*",
            "sass-embedded",
            "@types/*",
            "storybook",
            "@storybook/*",
            "vitest",
            "@vitest/*",
            "remark-*",
            "unified",
          ]

      patch:
        update-types: ["patch"]
        applies-to: version-updates
        exclude-patterns:
          [
            "tsdown",
            "vite",
            "@vitejs/*",
            "sass-embedded",
            "@types/*",
            "storybook",
            "@storybook/*",
            "vitest",
            "@vitest/*",
            "remark-*",
            "unified",
          ]

    ignore:
      # Ignore eslint major updates (eslint@10 currently conflicts with typescript-eslint + eslint-plugin-vue)
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]

      # Ignore @eslint/js major updates (v10 requires eslint ^10 but project is on eslint ^9)
      - dependency-name: "@eslint/js"
        update-types: ["version-update:semver-major"]

      # Ignore eslint-plugin-vue all updates (v10 requires eslint ^10 but project is on eslint ^9)
      - dependency-name: "eslint-plugin-vue"
        versions: ["*"]

  # Maintain dependencies for ui/packages/topology
  - package-ecosystem: "npm"
    directory: "/ui/packages/topology"
    commit-message:
      prefix: "build(topology)"
      prefix-development: "build(topology)"
    schedule:
      interval: "weekly"
      day: "wednesday"
      timezone: "Europe/Paris"
      time: "08:00"
    open-pull-requests-limit: 50
    labels: ["dependency-upgrade", "area/frontend"]
    groups:
      build:
        applies-to: version-updates
        patterns: ["tsdown", "vite", "@vitejs/*", "sass-embedded"]

      types:
        applies-to: version-updates
        patterns: ["@types/*"]

      vue-flow:
        applies-to: version-updates
        patterns: ["@vue-flow/*"]

      major:
        update-types: ["major"]
        applies-to: version-updates
        exclude-patterns:
          [
            "tsdown",
            "vite",
            "@vitejs/*",
            "sass-embedded",
            "@types/*",
            "@vue-flow/*",
          ]

      minor:
        update-types: ["minor"]
        applies-to: version-updates
        exclude-patterns:
          [
            "tsdown",
            "vite",
            "@vitejs/*",
            "sass-embedded",
            "@types/*",
            "@vue-flow/*",
          ]

      patch:
        update-types: ["patch"]
        applies-to: version-updates
        exclude-patterns:
          [
            "tsdown",
            "vite",
            "@vitejs/*",
            "sass-embedded",
            "@types/*",
            "@vue-flow/*",
          ]
