name: Build and Push Base Image

on:
#  schedule: FIXME enable once it's prod ready, disabled for now to try with dry run manually
#    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      uv-version:
        description: 'uv version to install'
        type: string
        required: false
        default: '0.6.17'
      dry-run:
        description: 'Build only, do not push'
        type: boolean
        required: false
        default: false

jobs:
  build-and-push:
    name: Build and Push kestra-base
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: ${{ inputs.dry-run != true }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.base
          push: ${{ inputs.dry-run != true }}
          tags: ghcr.io/kestra-io/kestra-base:latest
          build-args: |
            UV_VERSION=${{ inputs.uv-version || '0.6.17' }}
          cache-from: type=registry,ref=kestra/kestra-base:latest
          cache-to: type=inline

      - name: Slack - Notification
        if: ${{ failure() }}
        uses: kestra-io/actions/composite/slack-status@main
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          channel: 'C09FF36GKE1'
