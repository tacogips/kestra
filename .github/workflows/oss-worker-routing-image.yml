name: Publish OSS worker routing image

on:
  workflow_dispatch:
  push:
    branches:
      - feature/oss-worker-routing

permissions:
  contents: read
  packages: write

concurrency:
  group: oss-worker-routing-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Build and publish multi-arch image
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: "25"

      - name: Build Kestra executable
        run: |
          ./gradlew writeExecutableJar --no-daemon
          cp build/executable/kestra-2.0.0-SNAPSHOT docker/app/kestra
          chmod 755 docker/app/kestra

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          provenance: false
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:oss-worker-routing
            ghcr.io/${{ github.repository }}:oss-worker-routing-${{ github.sha }}
