plugins {
    id("com.gradle.develocity") version "4.4.0"
    id("com.gradle.common-custom-user-data-gradle-plugin") version "2.4.0"
}
def isCI = System.getenv('CI') != null
buildCache {
    remote(develocity.buildCache) {
        enabled = true
        push = isCI
    }
}
develocity {
    server = "https://develocity.kestra.io"
    buildScan {
        uploadInBackground = !isCI
        publishing.onlyIf {
            it.authenticated
        }
        buildScanPublished { scan ->
            if (isCI) {
                def payload = [
                    timestamp: new Date().toString(),
                    taskNames: gradle.startParameter.taskNames,
                    buildScanId: scan.buildScanId,
                    buildScanUri: scan.buildScanUri.toString()
                ]
                file("develocity-scan-output.ndjson") << groovy.json.JsonOutput.toJson(payload) + System.lineSeparator()
            }
        }
    }
}

rootProject.name = "kestra"


include 'platform'

include 'cli'
include 'core'
include 'tests'

include 'runner-memory'
include 'repository-memory'

include 'storage-local'

include 'jdbc'
include 'jdbc-h2'
include 'jdbc-mysql'
include 'jdbc-postgres'

include 'queue'
include 'queue-jdbc'

include 'webserver'
include 'executor'
include 'scheduler'
include 'worker'
include 'worker-controller'
include 'indexer'

include 'ui'
include 'model'
include 'processor'
include 'script'

include 'jmh-benchmarks'
