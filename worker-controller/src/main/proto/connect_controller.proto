syntax = "proto3";

option java_package = "io.kestra.controller.grpc";
option java_multiple_files = true;

import "request.proto";

// Service for worker connection and registration
service ConnectControllerService {
  // [Unary] Called by a worker to connect and resolve its worker group
  rpc connect(ConnectRequest) returns (ConnectResponse);
}

// Request message for worker connection
message ConnectRequest {
  RequestOrResponseHeader header = 1;
}

// Response message for worker connection
message ConnectResponse {
  RequestOrResponseHeader header = 1;
  // The resolved worker group ID.
  string worker_group_id = 2;
  // Serialized JSON configuration propagated from the controller to the worker
  bytes worker_configs = 3;
}
